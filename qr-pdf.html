<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>QR på PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
text-align:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
max-width:500px;
margin:auto;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:#2c7be5;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1a5fcc;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="box">

<h2>Legg QR-kode på PDF</h2>

<input type="file" id="pdfFile" accept="application/pdf">

<input type="text" id="url" value="https://www.traktorogmaskin.no">

<button onclick="leggTilQR()">Lag ny PDF</button>

</div>

<script>

async function leggTilQR(){

const fileInput = document.getElementById('pdfFile').files[0];
const url = document.getElementById('url').value;

if(!fileInput){
alert("Velg en PDF først");
return;
}

const pdfBytes = await fileInput.arrayBuffer();
const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);

const pages = pdfDoc.getPages();
const firstPage = pages[0];

const qrCanvas = document.createElement("canvas");

await QRCode.toCanvas(qrCanvas, url, { width:150 });

const qrImage = await pdfDoc.embedPng(qrCanvas.toDataURL());

firstPage.drawImage(qrImage,{
x:50,
y:50,
width:120,
height:120
});

const newPdf = await pdfDoc.save();

const blob = new Blob([newPdf], {type:"application/pdf"});
const link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "pdf-med-qr.pdf";
link.click();

}

</script>

</body>
</html>
